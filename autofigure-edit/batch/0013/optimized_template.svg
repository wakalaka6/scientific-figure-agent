  <rect x="1490" y="1400" width="770" height="340" rx="20" fill="#EADDF0" stroke="#9C4BE3" stroke-width="6" filter="url(#boxShadow)" />
  
  <!-- Placeholder for Cloud/Diffusion Icon -->
  <g id="AF10">
    <rect x="1540" y="1460" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1630" y="1550" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial">&lt;AF&gt;10</text>
  </g>

  <text x="1940" y="1520" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Video</text>
  <text x="1940" y="1590" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Diffusion</text>

  <rect x="1490" y="1760" width="770" height="70" rx="10" fill="#D9CBE6" />
  <text x="1875" y="1808" font-family="Arial, sans-serif" font-size="38" fill="#1A2B3C" text-anchor="middle">Conditioned on 4D Data</text>

  <!-- Arrow: Physical Motion Prediction to Video Diffusion -->
  <path d="M 3055 1300 L 3055 1350 L 1875 1350 L 1875 1400" fill="none" stroke="#1C5B42" stroke-width="8" marker-end="url(#arrowGreen)" />

  <!-- Arrow: Video Diffusion to Generated High-Quality Video -->
  <line x1="2260" y1="1545" x2="2450" y2="1545" stroke="#4B2B84" stroke-width="8" marker-end="url(#arrowPurple)" />

  <!-- Generated Video Box -->
  <rect x="2490" y="1390" width="1120" height="490" rx="20" fill="#FFFFFF" stroke="#E39C4B" stroke-width="8" filter="url(#boxShadow)" />
  
  <!-- Content Area for Video Frames -->
  <!-- Assuming the 3 images inside this box form one composite graphic -->
  <rect x="2520" y="1420" width="1060" height="340" fill="#3A3A3A" />
  <!-- Instead of separate placeholders for each frame, treating the whole frame area as one large placeholder based on instructions to replace icons/images -->
  <g id="AF12_VIDEO_FRAMES">
    <rect x="2520" y="1420" width="1060" height="340" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="3050" y="1590" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="64" font-family="Arial">GENERATED VIDEO FRAMES PLACEHOLDER</text>
  </g>

  <rect x="2520" y="1790" width="1060" height="70" rx="10" fill="#FDF3E8" />
  <text x="3050" y="1840" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1A2B3C" text-anchor="middle">GENERATED HIGH-QUALITY VIDEO</text>

  <!-- Bottom Caption -->
  <text x="1920" y="2030" font-family="Arial, sans-serif" font-size="40" font-style="italic" fill="#1A2B3C" text-anchor="middle">Leveraging physical prediction and diffusion for realistic video creation.</text>

</svg>