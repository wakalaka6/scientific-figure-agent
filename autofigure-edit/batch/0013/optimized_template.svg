<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2095" width="3840" height="2095">
  <!-- Definitions for gradients and generic styles -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBF4FA" />
      <stop offset="50%" stop-color="#E8EEF5" />
      <stop offset="100%" stop-color="#DDE6F0" />
    </linearGradient>

    <!-- Main Container Shadow -->
    <filter id="mainShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="10" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <!-- Step 1 Background Gradient (Blue) -->
    <linearGradient id="step1Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6F2FF" />
      <stop offset="100%" stop-color="#D9EBFF" />
    </linearGradient>

    <!-- Step 2 Background Gradient (Green) -->
    <linearGradient id="step2Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6F9F0" />
      <stop offset="100%" stop-color="#D9F2E6" />
    </linearGradient>

    <!-- Step 3 Background Gradient (Purple) -->
    <linearGradient id="step3Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2E6FF" />
      <stop offset="100%" stop-color="#E6D9FF" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2B5B84" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1C5B42" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B2B84" />
    </marker>
    <marker id="arrowSmallBlack" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>

    <!-- Box Shadows for inner components -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="5" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Global Background -->
  <rect width="3840" height="2095" fill="url(#bgGradient)" />

  <!-- Background decorative elements (faint network lines) -->
  <g stroke="#C0D0E0" stroke-width="2" opacity="0.4">
    <line x1="3300" y1="0" x2="3840" y2="500" />
    <line x1="3500" y1="0" x2="3840" y2="300" />
    <line x1="3600" y1="200" x2="3840" y2="700" />
    <circle cx="3650" cy="150" r="8" fill="#C0D0E0" />
    <circle cx="3750" cy="400" r="6" fill="#C0D0E0" />
    <circle cx="3800" cy="600" r="10" fill="#C0D0E0" />
    <line x1="0" y1="1200" x2="200" y2="1500" />
    <line x1="0" y1="1400" x2="150" y2="1800" />
    <circle cx="80" cy="1350" r="6" fill="#C0D0E0" />
    <circle cx="120" cy="1600" r="8" fill="#C0D0E0" />
  </g>

  <!-- Main Title -->
  <text x="1920" y="140" font-family="Arial, sans-serif" font-size="76" font-weight="bold" fill="#1A2B3C" text-anchor="middle" letter-spacing="2">WORLD MODEL: FROM STATIC 3D TO DYNAMIC VIDEO FLOW</text>

  <!-- Main Container -->
  <rect x="135" y="210" width="3570" height="1750" rx="40" fill="#F8FAFC" filter="url(#mainShadow)" stroke="#E0E6ED" stroke-width="4" />

  <!-- Subtitle -->
  <text x="1920" y="320" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1A2B3C" text-anchor="middle">World Model Pipeline</text>

  <!-- ========================================== -->
  <!-- STEP 1 SECTION (Top)                       -->
  <!-- ========================================== -->
  
  <!-- Step 1 Background Area -->
  <rect x="180" y="380" width="3480" height="420" rx="30" fill="url(#step1Bg)" />

  <!-- Step 1 Label Box -->
  <rect x="220" y="420" width="600" height="340" rx="20" fill="#EBF4FA" filter="url(#boxShadow)" />
  <rect x="360" y="450" width="320" height="70" rx="35" fill="#4B9CE3" />
  <text x="520" y="498" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF" text-anchor="middle">STEP 1</text>
  <text x="520" y="580" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">COARSE 3D</text>
  <text x="520" y="640" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">SANDBOX</text>
  <text x="520" y="700" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">GENERATION</text>

  <!-- Input Prompt -->
  <text x="1050" y="540" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Input Prompt</text>
  <text x="1050" y="600" font-family="Arial, sans-serif" font-size="38" font-style="italic" fill="#334455" text-anchor="middle">"A ball rolls down</text>
  <text x="1050" y="650" font-family="Arial, sans-serif" font-size="38" font-style="italic" fill="#334455" text-anchor="middle">a rocky ramp"</text>

  <!-- Arrow: Input Prompt to Coarse 3D Generation -->
  <line x1="1250" y1="590" x2="1620" y2="590" stroke="#2B5B84" stroke-width="8" marker-end="url(#arrowBlue)" />

  <!-- Coarse 3D Scene Generation Model Box -->
  <rect x="1660" y="380" width="750" height="390" rx="20" fill="#DCEAF6" stroke="#4B9CE3" stroke-width="6" filter="url(#boxShadow)" />
  
  <!-- Placeholders for Coarse 3D Scene Generation Model -->
  <g id="AF06">
    <rect x="1750" y="420" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1840" y="510" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial">&lt;AF&gt;06</text>
  </g>
  <g id="AF04">
    <rect x="1980" y="450" width="120" height="150" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2040" y="525" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="28" font-family="Arial">&lt;AF&gt;04</text>
  </g>
  <g id="AF03">
    <rect x="2150" y="440" width="160" height="160" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2230" y="520" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32" font-family="Arial">&lt;AF&gt;03</text>
  </g>

  <text x="2035" y="680" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Coarse 3D Scene</text>
  <text x="2035" y="730" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Generation Model</text>

  <!-- Arrow: Coarse 3D Model to Coarse 3D Representation -->
  <line x1="2410" y1="590" x2="2610" y2="590" stroke="#2B5B84" stroke-width="8" marker-end="url(#arrowBlue)" />

  <!-- Coarse 3D Representation Box -->
  <rect x="2650" y="380" width="970" height="390" rx="20" fill="#FFFFFF" stroke="#4B9CE3" stroke-width="4" filter="url(#boxShadow)" />
  
  <!-- Placeholders for Coarse 3D Representation -->
  <g id="AF07">
    <rect x="2780" y="420" width="280" height="230" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2920" y="535" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="44" font-family="Arial">&lt;AF&gt;07</text>
  </g>
  <g id="AF11">
    <rect x="3130" y="440" width="400" height="210" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="3330" y="545" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="44" font-family="Arial">&lt;AF&gt;11</text>
  </g>

  <text x="3135" y="730" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Coarse 3D Representation</text>

  <!-- ========================================== -->
  <!-- STEP 2 SECTION (Middle)                    -->
  <!-- ========================================== -->
  
  <!-- Step 2 Background Area -->
  <rect x="180" y="860" width="3480" height="460" rx="30" fill="url(#step2Bg)" />

  <!-- Step 2 Label Box -->
  <rect x="220" y="920" width="600" height="340" rx="20" fill="#EAF6F0" filter="url(#boxShadow)" />
  <rect x="360" y="950" width="320" height="70" rx="35" fill="#4BB382" />
  <text x="520" y="998" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF" text-anchor="middle">STEP 2</text>
  <text x="520" y="1080" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">VLM-BASED</text>
  <text x="520" y="1140" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">PHYSICAL MOTION</text>
  <text x="520" y="1200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">PREDICTION</text>

  <!-- Physics Equations -->
  <text x="1050" y="1000" font-family="Times New Roman, serif" font-size="40" font-style="italic" fill="#1A2B3C" text-anchor="middle">f = ∫<tspan font-size="24" dy="-15">e</tspan><tspan font-size="24" dy="30">s=1</tspan><tspan dy="-15"> </tspan><tspan font-family="Arial">∂</tspan>v / <tspan font-family="Arial">∂</tspan>t</text>
  <text x="1050" y="1050" font-family="Times New Roman, serif" font-size="40" font-style="italic" fill="#1A2B3C" text-anchor="middle"><tspan font-family="Arial">∂</tspan>u / <tspan font-family="Arial">∂</tspan>t + ½ ζ<tspan font-size="24" dy="10">i</tspan><tspan dy="-10">(C)</tspan></text>
  <text x="1050" y="1100" font-family="Times New Roman, serif" font-size="40" font-style="italic" fill="#1A2B3C" text-anchor="middle">E = √(n² + h²)</text>
  <text x="1050" y="1170" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Physics Laws</text>
  <text x="1050" y="1220" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#1A2B3C" text-anchor="middle">&amp; Constraints</text>

  <!-- Arrow: Physics to VLM -->
  <line x1="1250" y1="1080" x2="1470" y2="1080" stroke="#1C5B42" stroke-width="8" marker-end="url(#arrowGreen)" />

  <!-- VLM Box -->
  <rect x="1510" y="920" width="830" height="310" rx="20" fill="#DDF0E6" stroke="#4BB382" stroke-width="6" filter="url(#boxShadow)" />
  
  <!-- Placeholder for VLM Brain -->
  <g id="AF02">
    <rect x="1560" y="980" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1650" y="1070" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial">&lt;AF&gt;02</text>
  </g>

  <text x="1850" y="1090" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#1C5B42" text-anchor="middle">VLM</text>
  <text x="2180" y="1030" font-family="Arial, sans-serif" font-size="40" fill="#1A2B3C" text-anchor="end">Physical</text>
  <text x="2180" y="1080" font-family="Arial, sans-serif" font-size="40" fill="#1A2B3C" text-anchor="end">Language</text>
  <text x="2180" y="1130" font-family="Arial, sans-serif" font-size="40" fill="#1A2B3C" text-anchor="end">Model</text>

  <!-- Arrow: Coarse 3D Rep to VLM -->
  <path d="M 3170 770 L 3170 820 L 2470 820 L 2470 1280 L 1925 1280 L 1925 1230" fill="none" stroke="#2B5B84" stroke-width="8" marker-end="url(#arrowBlue)" />

  <!-- Arrow: VLM to Physical Motion Prediction -->
  <line x1="2340" y1="1080" x2="2450" y2="1080" stroke="#1C5B42" stroke-width="8" marker-end="url(#arrowGreen)" />

  <!-- Physical Motion Prediction Box -->
  <rect x="2480" y="900" width="1150" height="400" rx="20" fill="#FFFFFF" stroke="#4BB382" stroke-width="4" filter="url(#boxShadow)" />
  <text x="3055" y="970" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Physical Motion Prediction</text>
  
  <!-- Placeholders for 4D Sequence -->
  <g id="AF08">
    <rect x="2510" y="1000" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2600" y="1090" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32" font-family="Arial">&lt;AF&gt;08</text>
  </g>
  <text x="2600" y="1230" font-family="Arial, sans-serif" font-size="32" fill="#1A2B3C" text-anchor="middle">t=0</text>
  
  <line x1="2700" y1="1090" x2="2740" y2="1090" stroke="#000000" stroke-width="4" marker-end="url(#arrowSmallBlack)" />
  
  <g id="AF01">
    <rect x="2760" y="1000" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2850" y="1090" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32" font-family="Arial">&lt;AF&gt;01</text>
  </g>
  <text x="2850" y="1230" font-family="Arial, sans-serif" font-size="32" fill="#1A2B3C" text-anchor="middle">t=1</text>
  
  <line x1="2950" y1="1090" x2="2990" y2="1090" stroke="#000000" stroke-width="4" marker-end="url(#arrowSmallBlack)" />
  
  <g id="AF09">
    <rect x="3010" y="1000" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="3100" y="1090" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32" font-family="Arial">&lt;AF&gt;09</text>
  </g>
  <text x="3100" y="1230" font-family="Arial, sans-serif" font-size="32" fill="#1A2B3C" text-anchor="middle">t=2</text>
  
  <line x1="3200" y1="1090" x2="3240" y2="1090" stroke="#000000" stroke-width="4" marker-end="url(#arrowSmallBlack)" />
  
  <g id="AF05">
    <rect x="3260" y="1000" width="180" height="180" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="3350" y="1090" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32" font-family="Arial">&lt;AF&gt;05</text>
  </g>
  <text x="3350" y="1230" font-family="Arial, sans-serif" font-size="32" fill="#1A2B3C" text-anchor="middle">t=3</text>
  
  <text x="3500" y="1090" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">...</text>

  <text x="3055" y="1270" font-family="Arial, sans-serif" font-size="38" fill="#1A2B3C" text-anchor="middle">4D Sequence (Time-Varying 3D)</text>

  <!-- ========================================== -->
  <!-- STEP 3 SECTION (Bottom)                    -->
  <!-- ========================================== -->
  
  <!-- Step 3 Background Area -->
  <rect x="180" y="1360" width="3480" height="560" rx="30" fill="url(#step3Bg)" />

  <!-- Step 3 Label Box -->
  <rect x="220" y="1420" width="730" height="250" rx="20" fill="#F4EAF6" filter="url(#boxShadow)" />
  <rect x="360" y="1450" width="320" height="70" rx="35" fill="#9C4BE3" />
  <text x="520" y="1498" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF" text-anchor="middle">STEP 3</text>
  <text x="585" y="1580" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">VIDEO DIFFUSION</text>
  <text x="585" y="1640" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1A2B3C" text-anchor="middle">&amp; SYNTHESIS</text>

  <!-- Arrow: Step 3 Label to Video Diffusion -->
  <line x1="950" y1="1545" x2="1470" y2="1545" stroke="#4B2B84" stroke-width="8" marker-end="url(#arrowPurple)" />

