<svg width="1640" height="864" viewBox="0 0 1640 864" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowRed" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 Z" fill="#ff333c"/>
    </marker>
    <marker id="arrowBlack" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#111"/>
    </marker>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-weight:800;font-size:30px;fill:#090909}
      .smalltitle{font-family:Arial, Helvetica, sans-serif;font-weight:800;font-size:24px;fill:#090909}
      .body{font-family:Arial, Helvetica, sans-serif;font-size:24px;fill:#111}
      .italic{font-family:Arial, Helvetica, sans-serif;font-style:italic;font-size:25px;fill:#111}
      .mono{font-family:"Courier New", monospace;font-size:24px;fill:#111}
      .bold{font-weight:800}
      .green{fill:#078d18;font-weight:800}
      .blue{fill:#0067a8;font-weight:800}
      .red{fill:#a00025;font-weight:800}
      .purple{fill:#7c54ce}
      .dashed{stroke:#111;stroke-width:3;stroke-dasharray:5 8}
    </style>
  </defs>

  <!-- Policy-gradient path -->
  <path d="M557 164 L557 38 L1514 38 L1514 97" fill="none" stroke="#ff333c" stroke-width="6"/>
  <path d="M557 38 L557 164" fill="none" stroke="#ff333c" stroke-width="6" marker-end="url(#arrowRed)"/>
  <rect x="891" y="14" width="286" height="51" rx="14" ry="14" fill="#fff" stroke="#111" stroke-width="3" filter="url(#shadow)"/>
  <text x="1034" y="49" text-anchor="middle" class="title" font-size="27">Policy Gradient</text>

  <!-- Task box -->
  <rect x="48" y="93" width="400" height="295" rx="19" fill="#dedede" stroke="#111" stroke-width="4" filter="url(#shadow)"/>
  <text x="91" y="131" class="title">Task Description</text>
  <rect x="73" y="149" width="348" height="207" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="5 8" filter="url(#softShadow)"/>
  <text x="90" y="201" class="italic">
    <tspan x="90" dy="0">Count the number of</tspan>
    <tspan x="90" dy="40">items in DB with a price</tspan>
    <tspan x="90" dy="40">within the range specified</tspan>
    <tspan x="90" dy="40">by the user’s inputs.</tspan>
  </text>

  <!-- Question icon -->
  <g transform="translate(12,64)" filter="url(#softShadow)">
    <path d="M36 0 C16 0 0 15 0 35 C0 55 15 70 37 70 L68 77 L64 55 C71 48 73 39 71 30 C68 13 55 0 36 0Z" fill="#85d7df" stroke="#333" stroke-width="5"/>
    <path d="M29 22 C32 12 49 11 54 21 C59 31 48 38 43 43 C39 47 38 50 38 57" fill="none" stroke="#4b3a34" stroke-width="7" stroke-linecap="round"/>
    <circle cx="38" cy="63" r="4" fill="#4b3a34"/>
  </g>

  <!-- Arrow task to policy/generated -->
  <path d="M448 241 L642 241" fill="none" stroke="#ff333c" stroke-width="6" marker-end="url(#arrowRed)"/>

  <!-- Policy model graphic -->
  <g transform="translate(490,169)">
    <g stroke="#333" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M23 31 L61 15"/>
      <path d="M23 69 L61 53"/>
      <path d="M23 106 L61 91"/>
      <path d="M69 15 L103 28"/>
      <path d="M69 53 L103 53"/>
      <path d="M69 91 L103 77"/>
      <path d="M69 15 L103 77"/>
      <path d="M69 53 L103 28"/>
    </g>
    <circle cx="13" cy="31" r="12" fill="#5be0dd" stroke="#333" stroke-width="5"/>
    <circle cx="13" cy="69" r="12" fill="#5be0dd" stroke="#333" stroke-width="5"/>
    <circle cx="13" cy="106" r="12" fill="#5be0dd" stroke="#333" stroke-width="5"/>
    <circle cx="69" cy="15" r="12" fill="#ffd735" stroke="#333" stroke-width="5"/>
    <circle cx="69" cy="53" r="12" fill="#ffd735" stroke="#333" stroke-width="5"/>
    <circle cx="69" cy="91" r="12" fill="#ffd735" stroke="#333" stroke-width="5"/>
    <circle cx="124" cy="50" r="12" fill="#f04b62" stroke="#333" stroke-width="5"/>
    <circle cx="124" cy="88" r="12" fill="#f04b62" stroke="#333" stroke-width="5"/>
  </g>
  <text x="557" y="343" text-anchor="middle" class="title">Policy Model</text>

  <!-- Generated Program main box -->
  <rect x="678" y="94" width="692" height="294" rx="19" fill="#dedede" stroke="#111" stroke-width="4" filter="url(#shadow)"/>
  <text x="735" y="131" class="title">Generated Program</text>

  <!-- code icon top -->
  <g transform="translate(672,58)">
    <path d="M0 0 L40 0 L55 15 L55 70 L0 70 Z" fill="#fff" stroke="#5b126e" stroke-width="5" stroke-linejoin="round"/>
    <path d="M40 0 L40 15 L55 15" fill="none" stroke="#5b126e" stroke-width="5"/>
    <text x="27" y="48" text-anchor="middle" font-family="Courier New, monospace" font-weight="800" font-size="31" fill="#7b59d2">&lt;/&gt;</text>
  </g>

  <rect x="708" y="148" width="625" height="218" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="5 8" filter="url(#softShadow)"/>
  <text x="725" y="176" class="mono">
    <tspan x="725" dy="0">cur = </tspan><tspan class="green">sqlite3</tspan><tspan>.</tspan><tspan class="blue">connect</tspan><tspan>(DB).</tspan><tspan class="blue">cursor</tspan><tspan>()</tspan>
    <tspan x="725" dy="29" class="red">min</tspan><tspan> = </tspan><tspan class="blue">input</tspan><tspan>('Min?'); </tspan><tspan class="red">max</tspan><tspan> = </tspan><tspan class="blue">input</tspan><tspan>('Max?')</tspan>
    <tspan x="725" dy="29">...</tspan>
    <tspan x="725" dy="29" class="red">Q</tspan><tspan> = "</tspan><tspan class="green">SELECT COUNT</tspan><tspan>(*) </tspan><tspan class="green">FROM</tspan><tspan> items \</tspan>
    <tspan x="905" dy="31" class="green">WHERE</tspan><tspan> price &lt;= </tspan><tspan class="red">{max}</tspan><tspan> \</tspan>
    <tspan x="905" dy="31" class="green">AND</tspan><tspan> price &gt;= </tspan><tspan class="red">{min}</tspan><tspan>"</tspan>
    <tspan x="725" dy="31">cur.</tspan><tspan class="blue">execute</tspan><tspan>(</tspan><tspan class="red">Q</tspan><tspan>)</tspan>
  </text>

  <!-- Down red arrows from generated program -->
  <path d="M792 372 L792 437" fill="none" stroke="#ff333c" stroke-width="10" marker-end="url(#arrowRed)"/>
  <path d="M1189 372 L1189 437" fill="none" stroke="#ff333c" stroke-width="10" marker-end="url(#arrowRed)"/>

  <!-- Bottom vulnerability detector -->
  <rect x="48" y="419" width="865" height="438" rx="22" fill="#fff7e8" stroke="#111" stroke-width="4" filter="url(#shadow)"/>
  <text x="70" y="463" class="title">Vulnerability Detector <tspan font-size="23" font-weight="800">(via Program Analysis)</tspan></text>
  <text x="72" y="491" font-family="Arial, Helvetica, sans-serif" font-size="22" font-style="italic" font-weight="800">Example: SQL Injection Detector</text>

  <rect x="69" y="510" width="199" height="252" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="5 8" filter="url(#softShadow)"/>
  <rect x="275" y="510" width="496" height="252" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="5 8" filter="url(#softShadow)"/>

  <text x="169" y="539" text-anchor="middle" class="smalltitle">CFG</text>
  <g transform="translate(93,550)">
    <g stroke="#111" stroke-width="4" fill="none" marker-end="url(#arrowBlack)">
      <path d="M58 28 L20 80"/>
      <path d="M61 33 L96 80"/>
      <path d="M105 94 L63 148"/>
      <path d="M108 96 L139 148"/>
    </g>
    <circle cx="58" cy="25" r="25" fill="#f2bd72" stroke="#111" stroke-width="4" filter="url(#softShadow)"/>
    <circle cx="12" cy="88" r="25" fill="#e6e6e6" stroke="#111" stroke-width="4" filter="url(#softShadow)"/>
    <circle cx="104" cy="91" r="25" fill="#f2bd72" stroke="#111" stroke-width="4" filter="url(#softShadow)"/>
    <circle cx="51" cy="158" r="25" fill="#e6e6e6" stroke="#111" stroke-width="4" filter="url(#softShadow)"/>
    <circle cx="138" cy="158" r="25" fill="#f2bd72" stroke="#111" stroke-width="4" filter="url(#softShadow)"/>
    <text x="58" y="35" text-anchor="middle" font-family="Arial" font-weight="800" font-size="30">1</text>
    <text x="104" y="101" text-anchor="middle" font-family="Arial" font-weight="800" font-size="30">2</text>
    <text x="138" y="168" text-anchor="middle" font-family="Arial" font-weight="800" font-size="30">3</text>
  </g>

  <text x="523" y="540" text-anchor="middle" class="smalltitle">Tainted Analysis</text>
  <text x="282" y="580" class="mono">
    <tspan class="red">{max,min}</tspan>
    <tspan x="283" dy="64" class="red">{max,min,Q}</tspan>
    <tspan x="282" dy="69">cur.</tspan><tspan class="blue">execute</tspan><tspan>(</tspan><tspan class="red">Q</tspan><tspan>)</tspan>
  </text>
  <text x="459" y="584" font-family="Arial, Helvetica, sans-serif" font-size="23" font-style="italic">
    <tspan x="459" dy="0">1. User inputs as taint </tspan><tspan font-weight="800">src.</tspan>
    <tspan x="475" dy="64">2. Propagate tainted var.</tspan>
    <tspan x="523" dy="69">3. SQL exec. as </tspan><tspan font-weight="800">sink.</tspan>
  </text>
  <path d="M755 575 L755 718" stroke="#111" stroke-width="4" marker-start="url(#arrowBlack)" marker-end="url(#arrowBlack)"/>
  <path d="M255 707 L301 707" stroke="#111" stroke-width="2" stroke-dasharray="5 8" marker-end="url(#arrowBlack)"/>
  <path d="M174 574 L282 574" stroke="#111" stroke-width="2" stroke-dasharray="5 8"/>
  <path d="M174 640 L282 640" stroke="#111" stroke-width="2" stroke-dasharray="5 8"/>
  <text x="792" y="629" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" text-decoration="underline">Reward:</text>
  <text x="782" y="664" font-family="Arial, Helvetica, sans-serif" font-size="24" font-style="italic">
    <tspan fill="#1a9b29">Pass</tspan><tspan fill="#111"> or </tspan><tspan fill="#d11d39">Fail</tspan>
  </text>

  <text x="92" y="806" font-family="Arial, Helvetica, sans-serif" font-size="26">
    Convert the program into a <tspan font-weight="800">Control Flow Graph (CFG)</tspan> and conduct
  </text>
  <text x="177" y="840" font-family="Arial, Helvetica, sans-serif" font-size="26">
    <tspan font-weight="800">Taint Analysis</tspan> to detect SQL injection vulnerabilities.
  </text>

  <!-- Plus sign -->
  <text x="959" y="661" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="88">+</text>

  <!-- Functionality verifier -->
  <rect x="999" y="419" width="614" height="438" rx="22" fill="#dceeee" stroke="#111" stroke-width="4" filter="url(#shadow)"/>
  <text x="1024" y="468" class="title">Functionality Verifier <tspan font-size="23" font-weight="800">(via Unit Tests)</tspan></text>

  <rect x="1024" y="501" width="372" height="262" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="5 8" filter="url(#softShadow)"/>
  <text x="1043" y="534" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">
    Unit Tests <tspan font-size="18" font-style="italic">(e.g. min~max→output)</tspan>
  </text>

  <g transform="translate(1037,553)">
    <g>
      <circle cx="21" cy="21" r="19" fill="#eee" stroke="#111" stroke-width="4"/>
      <text x="21" y="31" text-anchor="middle" font-family="Arial" font-size="29" font-weight="800">i</text>
      <path d="M3 42 C-2 47 0 52 8 52" fill="none" stroke="#111" stroke-width="3"/>
    </g>
    <g transform="translate(0,65)">
      <circle cx="21" cy="21" r="19" fill="#eee" stroke="#111" stroke-width="4"/>
      <text x="21" y="31" text-anchor="middle" font-family="Arial" font-size="29" font-weight="800">i</text>
      <path d="M3 42 C-2 47 0 52 8 52" fill="none" stroke="#111" stroke-width="3"/>
    </g>
    <g transform="translate(0,154)">
      <circle cx="21" cy="21" r="19" fill="#eee" stroke="#111" stroke-width="4"/>
      <text x="21" y="31" text-anchor="middle" font-family="Arial" font-size="29" font-weight="800">i</text>
      <path d="M3 42 C-2 47 0 52 8 52" fill="none" stroke="#111" stroke-width="3"/>
    </g>
  </g>

  <text x="1104" y="584" font-family="Arial, Helvetica, sans-serif" font-size="27">
    <tspan font-style="italic" font-weight="800">Test 1:</tspan><tspan> $2.5~$10→3</tspan>
    <tspan x="1104" dy="66"><tspan font-style="italic" font-weight="800">Test 2:</tspan> $3~$1→0</tspan>
    <tspan x="1118" dy="43">......</tspan>
    <tspan x="1104" dy="50"><tspan font-style="italic" font-weight="800">Test n:</tspan> $7~$100→10</tspan>
  </text>

  <!-- Generated program mini -->
  <rect x="1429" y="543" width="159" height="220" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="5 8"/>
  <g transform="translate(1466,571)">
    <path d="M0 0 L66 0 L90 24 L90 111 L0 111 Z" fill="#fff" stroke="#5b126e" stroke-width="8" stroke-linejoin="round"/>
    <path d="M66 0 L66 24 L90 24" fill="none" stroke="#5b126e" stroke-width="8"/>
    <text x="45" y="75" text-anchor="middle" font-family="Courier New, monospace" font-weight="800" font-size="45" fill="#7b59d2">&lt;/&gt;</text>
  </g>
  <text x="1509" y="713" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">
    <tspan x="1509" dy="0">Generated</tspan>
    <tspan x="1509" dy="31">Program</tspan>
  </text>
  <path d="M1380 570 L1460 601" stroke="#111" stroke-width="7" fill="none" marker-end="url(#arrowBlack)"/>
  <path d="M1380 641 L1460 640" stroke="#111" stroke-width="7" fill="none" marker-end="url(#arrowBlack)"/>
  <path d="M1381 721 L1460 665" stroke="#111" stroke-width="7" fill="none" marker-end="url(#arrowBlack)"/>

  <text x="1195" y="827" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="800" text-decoration="underline">Reward:</text>
  <text x="1324" y="806" font-family="Times New Roman, serif" font-size="26" font-style="italic"># passed tests</text>
  <line x1="1321" y1="812" x2="1478" y2="812" stroke="#111" stroke-width="2"/>
  <text x="1325" y="835" font-family="Times New Roman, serif" font-size="26" font-style="italic"># total tests</text>

  <!-- Hybrid reward and advantage -->
  <path d="M1515 419 L1515 280" stroke="#ff333c" stroke-width="7" fill="none" marker-end="url(#arrowRed)"/>
  <rect x="1402" y="334" width="226" height="52" rx="12" fill="#fff" stroke="#111" stroke-width="4" filter="url(#shadow)"/>
  <text x="1515" y="369" text-anchor="middle" class="title" font-size="28">Hybrid Reward</text>

  <!-- Advantage icon -->
  <g transform="translate(1435,99)">
    <text x="82" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">Advantage</text>
    <rect x="18" y="89" width="18" height="41" fill="#ffd340" stroke="#111" stroke-width="5"/>
    <rect x="65" y="65" width="20" height="65" fill="#49e8a1" stroke="#111" stroke-width="5"/>
    <rect x="110" y="47" width="20" height="83" fill="#66b7ff" stroke="#111" stroke-width="5"/>
    <path d="M28 51 L34 64 L48 67 L36 75 L38 89 L27 81 L15 88 L19 74 L8 65 L22 63 Z" fill="#6ea7ff" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
    <path d="M75 18 L83 35 L101 38 L88 50 L91 68 L75 58 L59 68 L62 50 L49 38 L67 35 Z" fill="#ffe156" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
    <g transform="translate(98,0)">
      <path d="M19 35 L8 35 L4 16 L14 24 L23 6 L32 24 L43 16 L39 35 Z" fill="#ffd94c" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
      <circle cx="4" cy="15" r="4" fill="#ffd94c" stroke="#111" stroke-width="4"/>
      <circle cx="23" cy="5" r="4" fill="#ffd94c" stroke="#111" stroke-width="4"/>
      <circle cx="43" cy="15" r="4" fill="#ffd94c" stroke="#111" stroke-width="4"/>
      <rect x="7" y="35" width="33" height="7" fill="#ffd94c" stroke="#111" stroke-width="4"/>
    </g>
