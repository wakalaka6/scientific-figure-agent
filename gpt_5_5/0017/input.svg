<svg xmlns="http://www.w3.org/2000/svg" width="1916" height="844" viewBox="0 0 1916 844">
  <defs>
    <marker id="arrowGrey" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#666"/>
    </marker>
    <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>
    <marker id="arrowGreen" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L18,9 L0,18 Z" fill="#d9f0cf" stroke="#71ae67" stroke-width="2"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6b91bf"/>
    </marker>
    <marker id="arrowLtGrey" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#999"/>
