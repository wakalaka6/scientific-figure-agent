    <style>
      .serif{font-family: Georgia, "Times New Roman", serif;}
      .bold{font-weight:700;}
      .panel{fill:#f8fcf8;stroke:#606060;stroke-width:4;}
      .rpanel{fill:#fbf8f7;stroke:#606060;stroke-width:4;}
      .blackStroke{stroke:#111;stroke-width:4;stroke-linejoin:round;}
      .thinBlack{stroke:#111;stroke-width:3;stroke-linejoin:round;}
      .greyArrow{stroke:#666;stroke-width:8;fill:none;marker-end:url(#arrowGrey);}
      .blackArrow{stroke:#111;stroke-width:4;fill:none;marker-end:url(#arrowBlack);}
      .dashArrow{stroke:#111;stroke-width:4;fill:none;stroke-dasharray:4 6;marker-end:url(#arrowBlack);}
      .gArrow{stroke:#72ae68;stroke-width:6;fill:none;marker-end:url(#arrowGreen);}
      .node{fill:#c6def5;stroke:#6688aa;stroke-width:4;}
      .tiny{font-size:26px;}
    </style>

    <g id="miniGraph">
      <circle cx="6" cy="22" r="4" fill="#ff4d32" stroke="#333" stroke-width="1.5"/>
      <circle cx="22" cy="8" r="4" fill="#ff4d32" stroke="#333" stroke-width="1.5"/>
      <circle cx="42" cy="12" r="4" fill="#ff4d32" stroke="#333" stroke-width="1.5"/>
      <circle cx="55" cy="32" r="4" fill="#ff4d32" stroke="#333" stroke-width="1.5"/>
      <circle cx="28" cy="38" r="4" fill="#ff4d32" stroke="#333" stroke-width="1.5"/>
      <circle cx="7" cy="48" r="4" fill="#ff4d32" stroke="#333" stroke-width="1.5"/>
      <path d="M6 22 L22 8 L42 12 L55 32 L28 38 L7 48 M22 8 L28 38 M42 12 L28 38 M6 22 L7 48" fill="none" stroke="#111" stroke-width="2"/>
    </g>

    <g id="miniGear">
      <path d="M30 6 L36 12 L44 10 L47 18 L55 22 L52 31 L57 39 L50 45 L49 54 L39 55 L32 61 L24 55 L15 56 L12 47 L5 41 L10 33 L8 24 L16 19 L20 10 Z"
