<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2221" width="3840" height="2221">
  <defs>
    <style>
      .bg-white { fill: #ffffff; }
      .bg-light-blue { fill: #f0f8ff; }
