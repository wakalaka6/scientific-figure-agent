      .bg-light-pink { fill: #fff0f5; }
      .text-black { fill: #000000; }
      .text-red { fill: #cc0000; }
      .text-blue { fill: #0000cc; }
      .text-green { fill: #008000; }
      .font-mono { font-family: monospace; }
      .font-serif { font-family: serif; }
      .font-sans { font-family: sans-serif; }
      .font-bold { font-weight: bold; }
      .border-dash { stroke: #000000; stroke-width: 4; stroke-dasharray: 20, 10, 5, 10; fill: none; }
      .border-solid { stroke: #000000; stroke-width: 4; fill: none; }
      .border-red { stroke: #cc0000; stroke-width: 4; fill: none; }
      .border-yellow { stroke: #ffff00; stroke-width: 4; fill: none; }
