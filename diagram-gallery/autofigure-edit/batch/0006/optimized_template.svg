    <text x="245" y="220" class="text-axis" transform="rotate(-45 245 220)">Japan</text>
  </g>

  <!-- Chart 3 -->
  <g transform="translate(1500, 1740)">
    <text x="10" y="50" class="text-math">log p<sub>θ+</sub>(y<sub>t</sub> | x, y<sub>&lt;t</sub>)</text>
    <line x1="50" y1="200" x2="300" y2="200" class="axis-line" />
    <rect x="70" y="160" width="30" height="40" class="bar-red" />
