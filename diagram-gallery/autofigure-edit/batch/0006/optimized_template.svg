  <!-- Big Equation -->
  <text x="1950" y="1350" class="text-math-large">log p<sub>θ</sub>(y<sub>t</sub> | x, y<sub>&lt;t</sub>) - α log p<sub>θ-</sub>(y<sub>t</sub> | x, y<sub>&lt;t</sub>) + γ log p<sub>θ+</sub>(y<sub>t</sub> | x, y<sub>&lt;t</sub>)</text>

