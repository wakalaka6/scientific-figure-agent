  <rect x="0" y="1034" width="3840" height="1034" class="bg-inference" />

  <!-- Titles -->
  <text x="40" y="100" class="text-title">Training Stage</text>
  <text x="40" y="1120" class="text-title">Inference Stage</text>

  <!-- Input Prompt 1 -->
