<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2068" width="3840" height="2068">
  <defs>
    <style>
      .bg-training { fill: #dcf0d9; }
      .bg-inference { fill: #ffeadd; }
      .text-title { font-family: Arial, sans-serif; font-size: 64px; fill: #000; }
      .text-input { font-family: "Times New Roman", serif; font-style: italic; font-size: 80px; fill: #222; }
      .text-label { font-family: Arial, sans-serif; font-size: 36px; fill: #000; text-anchor: middle; }
      .text-green { fill: #2ca02c; font-family: Arial, sans-serif; font-size: 48px; }
      .text-red { fill: #d62728; font-family: Arial, sans-serif; font-size: 48px; }
      .text-math { font-family: "Times New Roman", serif; font-style: italic; font-size: 48px; fill: #000; }
      .text-math-large { font-family: "Times New Roman", serif; font-style: italic; font-size: 56px; fill: #000; }
      .text-axis { font-family: Arial, sans-serif; font-size: 32px; fill: #ff6b6b; transform-origin: left bottom; }
      .text-axis-blue { font-family: Arial, sans-serif; font-size: 32px; fill: #00a8ff; transform-origin: left bottom; }
      .text-desc { font-family: Arial, sans-serif; font-size: 40px; fill: #000; text-anchor: middle; }
      .text-canada { font-family: Arial, sans-serif; font-size: 56px; fill: #00a8ff; }
      .arrow { fill: #a0a0a0; }
      .box-doc { fill: #e6e6e6; stroke: #000; stroke-width: 3; }
      .bar-red { fill: #ff6b6b; }
      .bar-blue { fill: #00a8ff; }
      .axis-line { stroke: #000; stroke-width: 4; }
      .bracket { stroke: #000; stroke-width: 4; fill: none; }
      .diamond { fill: #80e5ff; stroke: #000; stroke-width: 4; }
    </style>
  </defs>

  <!-- Backgrounds -->
