<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 1784" width="3840" height="1784">
  <defs>
    <style>
      .title { font-family: sans-serif; font-weight: bold; font-size: 56px; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-weight: bold; font-size: 48px; text-anchor: middle; fill: white; }
      .text-normal { font-family: sans-serif; font-size: 40px; }
      .text-bold { font-family: sans-serif; font-weight: bold; font-size: 40px; }
