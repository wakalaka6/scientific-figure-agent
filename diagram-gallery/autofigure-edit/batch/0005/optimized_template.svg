      .arrow-green { stroke: #4CAF50; stroke-width: 6; fill: none; }
      .check-green { fill: #4CAF50; }
      .cross-red { fill: #F44336; }
      .cross-green { fill: #4CAF50; }
      .speech-bubble { fill: white; rx: 20; ry: 20; }
      .speech-bubble-tail { fill: white; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
