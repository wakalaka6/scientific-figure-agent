<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2027" width="3840" height="2027">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="15" dy="20" stdDeviation="15" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow-light" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="8" dy="12" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
    
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3b30"/>
    </marker>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arrow-black-thick" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>

  <!-- RED CONNECTING ARROWS (Drawn first to be under boxes if overlapping) -->
  <!-- Policy Gradient to Policy Model -->
  <path d="M 2100 95 L 1310 95 L 1310 330" fill="none" stroke="#ff3b30" stroke-width="12" marker-end="url(#arrow-red)"/>
  <!-- Policy Model to Generated Program -->
  <path d="M 1480 550 L 1550 550" fill="none" stroke="#ff3b30" stroke-width="12" marker-end="url(#arrow-red)"/>
  <!-- Advantage to Policy Gradient -->
  <path d="M 3540 200 L 3540 95 L 2790 95" fill="none" stroke="#ff3b30" stroke-width="12" marker-end="url(#arrow-red)"/>
  <!-- Hybrid Reward to Advantage -->
  <path d="M 3540 780 L 3540 660" fill="none" stroke="#ff3b30" stroke-width="12" marker-end="url(#arrow-red)"/>

  <!-- BIG DOWNWARD BLOCK ARROWS -->
  <!-- GP to Vuln Det -->
  <polygon points="1810,910 1810,960 1760,960 1840,1040 1920,960 1870,960 1870,910" fill="#ff3b30" stroke="#ff3b30" stroke-width="4"/>
  <!-- GP to Func Verifier -->
  <polygon points="2780,910 2780,960 2730,960 2810,1040 2890,960 2840,960 2840,910" fill="#ff3b30" stroke="#ff3b30" stroke-width="4"/>

  <!-- MAIN BOXES -->
  <!-- Box 1: Task Description -->
  <rect x="115" y="210" width="930" height="700" rx="40" fill="#e8e9ea" stroke="#000" stroke-width="8" filter="url(#shadow)"/>
  <text x="215" y="300" font-family="Arial, sans-serif" font-size="70" font-weight="bold">Task Description</text>
  <rect x="170" y="335" width="820" height="520" rx="10" fill="#fff" stroke="#000" stroke-width="8" stroke-dasharray="20,15"/>
  <text x="210" y="440" font-family="Georgia, serif" font-size="65" font-style="italic">Count the number of</text>
  <text x="210" y="540" font-family="Georgia, serif" font-size="65" font-style="italic">items in DB with a price</text>
  <text x="210" y="640" font-family="Georgia, serif" font-size="65" font-style="italic">within the range specified</text>
  <text x="210" y="740" font-family="Georgia, serif" font-size="65" font-style="italic">by the user's inputs.</text>

  <!-- Box 2: Generated Program -->
  <rect x="1580" y="210" width="1630" height="700" rx="40" fill="#e8e9ea" stroke="#000" stroke-width="8" filter="url(#shadow)"/>
  <text x="1720" y="300" font-family="Arial, sans-serif" font-size="70" font-weight="bold">Generated Program</text>
  <rect x="1650" y="335" width="1490" height="520" rx="10" fill="#fff" stroke="#000" stroke-width="8" stroke-dasharray="20,15"/>
  <text x="1690" y="440" font-family="Courier New, monospace" font-size="55" font-weight="bold">
    <tspan fill="#000">cur = sqlite3</tspan><tspan fill="#0066cc">.connect</tspan><tspan fill="#000">(DB).</tspan><tspan fill="#0066cc">cursor</tspan><tspan fill="#000">()</tspan>
  </text>
  <text x="1690" y="520" font-family="Courier New, monospace" font-size="55" font-weight="bold">
    <tspan fill="#cc0000">min</tspan><tspan fill="#000"> = </tspan><tspan fill="#0066cc">input</tspan><tspan fill="#000">('Min?'); </tspan><tspan fill="#cc0000">max</tspan><tspan fill="#000"> = </tspan><tspan fill="#0066cc">input</tspan><tspan fill="#000">('Max?')</tspan>
  </text>
  <text x="1690" y="600" font-family="Courier New, monospace" font-size="55" font-weight="bold" fill="#000">...</text>
  <text x="1690" y="680" font-family="Courier New, monospace" font-size="55" font-weight="bold">
    <tspan fill="#cc0000">Q</tspan><tspan fill="#000"> = </tspan><tspan fill="#009933">"SELECT COUNT(*) FROM items \</tspan>
  </text>
  <text x="1900" y="760" font-family="Courier New, monospace" font-size="55" font-weight="bold">
    <tspan fill="#009933">WHERE price &lt;= </tspan><tspan fill="#cc0000">{max}</tspan><tspan fill="#009933"> \</tspan>
  </text>
  <text x="1900" y="840" font-family="Courier New, monospace" font-size="55" font-weight="bold">
    <tspan fill="#009933">AND price &gt;= </tspan><tspan fill="#cc0000">{min}</tspan><tspan fill="#009933">"</tspan>
  </text>
  <text x="1690" y="920" font-family="Courier New, monospace" font-size="55" font-weight="bold">
    <tspan fill="#000">cur.</tspan><tspan fill="#0066cc">execute</tspan><tspan fill="#000">(</tspan><tspan fill="#cc0000">Q</tspan><tspan fill="#000">)</tspan>
  </text>

  <!-- Box 3: Vulnerability Detector -->
  <rect x="115" y="980" width="2030" height="1000" rx="40" fill="#f5f1e6" stroke="#000" stroke-width="8" filter="url(#shadow)"/>
  <text x="170" y="1080" font-family="Arial, sans-serif" font-size="70" font-weight="bold">Vulnerability Detector</text>
  <text x="1060" y="1075" font-family="Arial, sans-serif" font-size="45" font-weight="bold" font-style="italic">(via Program Analysis)</text>
  <text x="170" y="1145" font-family="Arial, sans-serif" font-size="45" font-style="italic" font-weight="bold">Example: SQL Injection Detector</text>
  
  <!-- CFG Section -->
  <rect x="170" y="1190" width="460" height="630" rx="10" fill="#fff" stroke="#000" stroke-width="6" stroke-dasharray="15,10"/>
  <text x="400" y="1255" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-anchor="middle">CFG</text>
  
  <!-- CFG Lines -->
  <line x1="300" y1="1330" x2="400" y2="1500" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
  <line x1="300" y1="1330" x2="200" y2="1500" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
  <line x1="400" y1="1500" x2="480" y2="1670" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
  <line x1="400" y1="1500" x2="320" y2="1670" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
  
  <!-- CFG Nodes -->
  <circle cx="300" cy="1330" r="50" fill="#ffb366" stroke="#000" stroke-width="8" filter="url(#shadow-light)"/>
  <text x="300" y="1350" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="400" cy="1500" r="50" fill="#ffb366" stroke="#000" stroke-width="8" filter="url(#shadow-light)"/>
  <text x="400" y="1520" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="480" cy="1670" r="50" fill="#ffb366" stroke="#000" stroke-width="8" filter="url(#shadow-light)"/>
  <text x="480" y="1690" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="200" cy="1500" r="50" fill="#fff" stroke="#000" stroke-width="8" filter="url(#shadow-light)"/>
  <circle cx="320" cy="1670" r="50" fill="#fff" stroke="#000" stroke-width="8" filter="url(#shadow-light)"/>

  <!-- Tainted Analysis Section -->
  <rect x="650" y="1190" width="1150" height="630" rx="10" fill="#fff" stroke="#000" stroke-width="6" stroke-dasharray="15,10"/>
  <text x="1225" y="1255" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-anchor="middle">Tainted Analysis</text>
  
  <!-- Dashed connections from CFG -->
  <line x1="350" y1="1330" x2="680" y2="1330" stroke="#000" stroke-width="4" stroke-dasharray="10,10" marker-end="url(#arrow-black)"/>
  <line x1="450" y1="1500" x2="680" y2="1500" stroke="#000" stroke-width="4" stroke-dasharray="10,10" marker-end="url(#arrow-black)"/>
  <line x1="530" y1="1670" x2="680" y2="1670" stroke="#000" stroke-width="4" stroke-dasharray="10,10" marker-end="url(#arrow-black)"/>

  <!-- Taint Text -->
  <text x="700" y="1345" font-family="Courier New, monospace" font-size="50" font-weight="bold" fill="#cc0000">{max,min}</text>
  <text x="1000" y="1345" font-family="Arial, sans-serif" font-size="45">1. User inputs as taint <tspan font-weight="bold" font-style="italic">src.</tspan></text>
  
  <text x="700" y="1515" font-family="Courier New, monospace" font-size="50" font-weight="bold" fill="#cc0000">{max,min,Q}</text>
  <text x="1050" y="1515" font-family="Arial, sans-serif" font-size="45">2. Propagate tainted var.</text>
  
  <text x="700" y="1685" font-family="Courier New, monospace" font-size="50" font-weight="bold">
    <tspan fill="#000">cur.</tspan><tspan fill="#0066cc">execute</tspan><tspan fill="#000">(</tspan><tspan fill="#cc0000">Q</tspan><tspan fill="#000">)</tspan>
  </text>
  <text x="1150" y="1685" font-family="Arial, sans-serif" font-size="45">3. SQL exec. as <tspan font-weight="bold" font-style="italic">sink.</tspan></text>

  <!-- Taint vertical line -->
  <path d="M 1750 1330 L 1750 1670" fill="none" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
  <circle cx="1750" cy="1330" r="10" fill="#fff" stroke="#000" stroke-width="6"/>

  <!-- Footer Text -->
  <text x="1135" y="1880" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">Convert the program into a <tspan font-weight="bold">Control Flow Graph (CFG)</tspan> and conduct</text>
  <text x="1135" y="1940" font-family="Arial, sans-serif" font-size="48" text-anchor="middle"><tspan font-weight="bold">Taint Analysis</tspan> to detect SQL injection vulnerabilities.</text>

  <!-- Vuln Det Reward -->
  <text x="1850" y="1450" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-decoration="underline">Reward:</text>
  <text x="1830" y="1530" font-family="Arial, sans-serif" font-size="55" font-style="italic">
    <tspan fill="#009933">Pass</tspan> <tspan fill="#000">or</tspan> <tspan fill="#cc0000">Fail</tspan>
  </text>

  <!-- Box 4: Functionality Verifier -->
  <rect x="2350" y="980" width="1440" height="1000" rx="40" fill="#e6f2f0" stroke="#000" stroke-width="8" filter="url(#shadow)"/>
  <text x="2410" y="1080" font-family="Arial, sans-serif" font-size="70" font-weight="bold">Functionality Verifier</text>
  <text x="3250" y="1075" font-family="Arial, sans-serif" font-size="45" font-weight="bold" font-style="italic">(via Unit Tests)</text>
  
  <rect x="2410" y="1160" width="1320" height="660" rx="10" fill="#fff" stroke="#000" stroke-width="6" stroke-dasharray="15,10"/>
  <text x="2450" y="1240" font-family="Arial, sans-serif" font-size="50" font-weight="bold">Unit Tests</text>
  <text x="2730" y="1240" font-family="Arial, sans-serif" font-size="40" font-style="italic">(e.g. min~max→output)</text>

  <!-- Test Lines -->
  <text x="2560" y="1360" font-family="Arial, sans-serif" font-size="55" font-style="italic" font-weight="bold">Test 1:<tspan font-weight="normal"> $2.5~$10→3</tspan></text>
  <text x="2560" y="1510" font-family="Arial, sans-serif" font-size="55" font-style="italic" font-weight="bold">Test 2:<tspan font-weight="normal"> $3~$1→0</tspan></text>
  <text x="2650" y="1610" font-family="Arial, sans-serif" font-size="55" font-weight="bold">......</text>
  <text x="2560" y="1710" font-family="Arial, sans-serif" font-size="55" font-style="italic" font-weight="bold">Test n:<tspan font-weight="normal"> $7~$100→10</tspan></text>

  <!-- Inner Right Box (Generated Program) -->
  <rect x="3300" y="1300" width="370" height="450" rx="10" fill="#fff" stroke="#000" stroke-width="6" stroke-dasharray="15,10"/>
  <text x="3485" y="1710" font-family="Arial, sans-serif" font-size="45" font-weight="bold" text-anchor="middle">Generated</text>
  <text x="3485" y="1760" font-family="Arial, sans-serif" font-size="45" font-weight="bold" text-anchor="middle">Program</text>

  <!-- Arrows to Generated Program -->
  <line x1="3050" y1="1360" x2="3320" y2="1420" stroke="#000" stroke-width="8" marker-end="url(#arrow-black-thick)"/>
  <line x1="3050" y1="1510" x2="3320" y2="1490" stroke="#000" stroke-width="8" marker-end="url(#arrow-black-thick)"/>
  <line x1="3050" y1="1710" x2="3320" y2="1560" stroke="#000" stroke-width="8" marker-end="url(#arrow-black-thick)"/>

  <!-- Func Ver Reward -->
  <text x="2800" y="1900" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-decoration="underline">Reward:</text>
  <line x1="3080" y1="1880" x2="3400" y2="1880" stroke="#000" stroke-width="6"/>
  <text x="3240" y="1860" font-family="Arial, sans-serif" font-size="45" text-anchor="middle"># passed tests</text>
  <text x="3240" y="1940" font-family="Arial, sans-serif" font-size="45" text-anchor="middle"># total tests</text>

  <!-- Big Plus Sign -->
  <path d="M 2180 1440 L 2230 1440 L 2230 1390 L 2270 1390 L 2270 1440 L 2320 1440 L 2320 1480 L 2270 1480 L 2270 1530 L 2230 1530 L 2230 1480 L 2180 1480 Z" fill="#000"/>

  <!-- POLICY MODEL (NEURAL NETWORK) -->
  <g id="policy-model">
    <!-- Connections Blue to Yellow -->
    <line x1="1180" y1="420" x2="1310" y2="380" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="420" x2="1310" y2="490" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="420" x2="1310" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="420" x2="1310" y2="710" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    
    <line x1="1180" y1="550" x2="1310" y2="380" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="550" x2="1310" y2="490" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="550" x2="1310" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="550" x2="1310" y2="710" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>

    <line x1="1180" y1="680" x2="1310" y2="380" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="680" x2="1310" y2="490" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="680" x2="1310" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1180" y1="680" x2="1310" y2="710" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>

    <!-- Connections Yellow to Red -->
    <line x1="1310" y1="380" x2="1440" y2="500" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="380" x2="1440" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="490" x2="1440" y2="500" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="490" x2="1440" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="600" x2="1440" y2="500" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="600" x2="1440" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="710" x2="1440" y2="500" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>
    <line x1="1310" y1="710" x2="1440" y2="600" stroke="#000" stroke-width="6" marker-end="url(#arrow-black)"/>

    <!-- Nodes -->
    <circle cx="1180" cy="420" r="30" fill="#40e0d0" stroke="#000" stroke-width="6"/>
    <circle cx="1180" cy="550" r="30" fill="#40e0d0" stroke="#000" stroke-width="6"/>
    <circle cx="1180" cy="680" r="30" fill="#40e0d0" stroke="#000" stroke-width="6"/>

    <circle cx="1310" cy="380" r="30" fill="#ffd700" stroke="#000" stroke-width="6"/>
    <circle cx="1310" cy="490" r="30" fill="#ffd700" stroke="#000" stroke-width="6"/>
    <circle cx="1310" cy="600" r="30" fill="#ffd700" stroke="#000" stroke-width="6"/>
    <circle cx="1310" cy="710" r="30" fill="#ffd700" stroke="#000" stroke-width="6"/>

    <circle cx="1440" cy="500" r="30" fill="#ff4d4d" stroke="#000" stroke-width="6"/>
    <circle cx="1440" cy="600" r="30" fill="#ff4d4d" stroke="#000" stroke-width="6"/>

    <text x="1310" y="800" font-family="Arial, sans-serif" font-size="65" font-weight="bold" text-anchor="middle">Policy Model</text>
  </g>

  <!-- POLICY GRADIENT BOX -->
  <rect x="2100" y="40" width="670" height="110" rx="55" fill="#fff" stroke="#000" stroke-width="8" filter="url(#shadow)"/>
  <text x="2435" y="115" font-family="Arial, sans-serif" font-size="65" font-weight="bold" text-anchor="middle">Policy Gradient</text>

  <!-- ADVANTAGE SECTION -->
  <g id="advantage">
    <!-- Bars -->
    <rect x="3400" y="450" width="40" height="130" rx="10" fill="#fdf0cc" stroke="#000" stroke-width="6"/>
    <rect x="3510" y="380" width="40" height="200" rx="10" fill="#ccf2da" stroke="#000" stroke-width="6"/>
    <rect x="3620" y="320" width="40" height="260" rx="10" fill="#cce0ff" stroke="#000" stroke-width="6"/>
    
    <!-- Stars -->
    <polygon points="3420,380 3428,395 3445,400 3428,405 3420,420 3412,405 3395,400 3412,395" fill="#ffd700" stroke="#000" stroke-width="4"/>
    <polygon points="3530,300 3540,325 3565,325 3545,340 3555,365 3530,350 3505,365 3515,340 3495,325 3520,325" fill="#ffd700" stroke="#000" stroke-width="4"/>
    <path d="M 3615 280 L 3625 240 L 3640 265 L 3655 240 L 3665 280 Z" fill="#ffd700" stroke="#000" stroke-width="4"/>
    
    <text x="3530" y="640" font-family="Arial, sans-serif" font-size="65" font-weight="bold" text-anchor="middle">Advantage</text>
  </g>

  <!-- HYBRID REWARD BOX -->
  <rect x="3370" y="780" width="440" height="110" rx="30" fill="#fff" stroke="#000" stroke-width="8" filter="url(#shadow)"/>
  <text x="3590" y="855" font-family="Arial, sans-serif" font-size="55" font-weight="bold" text-anchor="middle">Hybrid Reward</text>


  <!-- PLACEHOLDERS (<AF>XX) -->
  
  <g id="AF04">
    <rect x="25" y="130" width="160" height="160" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="105" y="210" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial, sans-serif">&lt;AF&gt;04</text>
  </g>

  <g id="AF06">
    <rect x="1530" y="130" width="120" height="160" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1590" y="210" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="28" font-family="Arial, sans-serif">&lt;AF&gt;06</text>
  </g>

  <g id="AF03">
    <rect x="2430" y="1285" width="90" height="90" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2475" y="1330" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="24" font-family="Arial, sans-serif">&lt;AF&gt;03</text>
  </g>

  <g id="AF02">
    <rect x="2430" y="1435" width="90" height="90" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2475" y="1480" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="24" font-family="Arial, sans-serif">&lt;AF&gt;02</text>
  </g>

  <g id="AF05">
    <rect x="2430" y="1635" width="90" height="90" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="2475" y="1680" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="24" font-family="Arial, sans-serif">&lt;AF&gt;05</text>
  </g>

  <g id="AF01">
    <rect x="3340" y="1340" width="290" height="300" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="3485" y="1490" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="60" font-family="Arial, sans-serif">&lt;AF&gt;01</text>
  </g>

</svg>