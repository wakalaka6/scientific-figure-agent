    <rect x="1333" y="481" width="39" height="166" fill="#93d9a7"/>
    <rect x="1372" y="481" width="39" height="166" fill="#ffc765"/>
    <rect x="1411" y="481" width="39" height="166" fill="#f28da5"/>
