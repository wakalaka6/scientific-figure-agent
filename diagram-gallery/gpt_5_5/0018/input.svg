  <text x="1044" y="762" class="txt" font-size="48">(</text>
  <text x="1074" y="754" class="txt" font-size="40" font-weight="bold">H<tspan baseline-shift="super" font-size="25">y</tspan> · Q</text>
  <line x1="1070" y1="768" x2="1168" y2="768" stroke="#111" stroke-width="2"/>
  <text x="1110" y="807" class="math" font-size="32">τ<tspan baseline-shift="-35%" font-size="20">y</tspan></text>
  <text x="1166" y="762" class="txt" font-size="48">)</text>
