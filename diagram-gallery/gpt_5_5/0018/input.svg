<svg xmlns="http://www.w3.org/2000/svg" width="1732" height="884" viewBox="0 0 1732 884">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .txt{font-family:"Times New Roman", Times, serif; fill:#111;}
      .math{font-family:"Times New Roman", Times, serif; font-style:italic; fill:#111;}
      .line{stroke:#111; stroke-width:3; fill:none;}
      .thin{stroke:#111; stroke-width:2; fill:none;}
      .box{fill:#eee; stroke:#5a2a2a; stroke-width:2.5;}
      .olive{stroke:#5b4d17; stroke-width:2.5;}
      .navy{stroke:#11183a; stroke-width:2.5;}
      .node{fill:#78a4ec;}
    </style>
  </defs>

  <!-- Panel (a) background -->
  <rect x="96" y="15" width="1616" height="424" fill="#d3f4f5"/>

  <!-- Panel labels and titles -->
  <text x="18" y="66" class="txt" font-size="40">(a)</text>
  <text x="158" y="67" class="txt" font-size="40">GIBMS</text>

  <!-- Top graph G -->
  <g stroke="#111" stroke-width="1.6">
    <line x1="234" y1="171" x2="233" y2="240"/>
    <line x1="233" y1="240" x2="176" y2="276"/>
    <line x1="233" y1="240" x2="292" y2="274"/>
