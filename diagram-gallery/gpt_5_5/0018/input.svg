  <rect class="box" x="410" y="139" width="82" height="191"/>
  <text class="txt" font-size="31" transform="translate(460 236) rotate(-90)" text-anchor="middle" dominant-baseline="middle">Encoder</text>

  <!-- H stack -->
  <path class="line" marker-end="url(#arrow)" d="M492 235 L562 235"/>
