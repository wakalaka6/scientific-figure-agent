  <!-- Loss -->
  <path class="line" marker-end="url(#arrow)" d="M1450 563 L1504 665"/>
  <path class="line" marker-end="url(#arrow)" d="M1450 773 L1504 665"/>
  <text x="1522" y="672" class="math" font-size="38">ℒ<tspan baseline-shift="-35%" font-size="25">soft</tspan>(s<tspan baseline-shift="super" font-size="24">y</tspan>, s<tspan baseline-shift="super" font-size="24">p</tspan>)</text>
</svg>