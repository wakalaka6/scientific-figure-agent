  <path class="line" marker-end="url(#arrow)" d="M1392 351 L1458 235"/>

  <text x="1462" y="237" class="math" font-size="42">− I (Y; 𝒢<tspan baseline-shift="-35%" font-size="25">IB</tspan>)</text>

