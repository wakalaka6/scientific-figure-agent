  <text x="943" y="248" class="txt" font-size="22" text-anchor="middle">0.9</text>
  <text x="884" y="282" class="txt" font-size="22" text-anchor="middle">0.7</text>
  <text x="1008" y="203" class="txt" font-size="22" text-anchor="middle">0.3</text>
  <text x="1005" y="284" class="txt" font-size="22" text-anchor="middle">0.6</text>

