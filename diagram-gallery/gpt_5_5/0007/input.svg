<svg width="1622" height="756" viewBox="0 0 1622 756" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4777c4"/>
    </marker>
    <radialGradient id="disc" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="38%" stop-color="#bfc2c5"/>
      <stop offset="70%" stop-color="#767b7f"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>
    <style>
      .serif{font-family:"Times New Roman", Times, serif;}
      .big{font-size:46px;}
      .med{font-size:39px;}
      .label{font-size:44px;font-weight:bold;font-style:italic;}
      .blueStroke{stroke:#4777c4;stroke-width:4;fill:none;marker-end:url(#arrow);}
      .token{stroke:#4777c4;stroke-width:3.5;rx:9;ry:9;}
      .cell{stroke:#000;stroke-width:2;}
      .panelText{font-family:"Times New Roman", Times, serif;font-size:42px;font-weight:bold;}
    </style>
  </defs>

  <rect width="1622" height="756" fill="white"/>

  <!-- Top language model -->
  <rect x="7" y="15" width="990" height="77" rx="10" ry="10" fill="#e4f0dc"/>
  <text x="36" y="67" class="serif big">
    Language Model <tspan font-style="italic">f</tspan><tspan baseline-shift="sub" font-size="28" font-style="italic">ϕ</tspan>
  </text>

  <!-- H_q tokens -->
  <text x="15" y="184" class="serif label">H<tspan baseline-shift="sub" font-size="28">q</tspan></text>
  <rect x="80" y="140" width="63" height="63" class="token" fill="#d2d2d2"/>
  <rect x="224" y="140" width="63" height="63" class="token" fill="#d2d2d2"/>
  <rect x="366" y="140" width="63" height="63" class="token" fill="#d2d2d2"/>

  <!-- Tokenizer -->
  <rect x="38" y="248" width="434" height="77" rx="10" ry="10" fill="#ededed"/>
  <text x="168" y="303" class="serif big">Tokenizer</text>

  <!-- Text input -->
  <text x="36" y="414" class="serif big">
    Language Instruction <tspan font-weight="bold" font-style="italic">X</tspan><tspan baseline-shift="sub" font-size="29" font-style="italic">q</tspan>
  </text>

  <!-- Arrows for text branch -->
  <path d="M255 248 L255 206" class="blueStroke"/>
  <path d="M255 140 L255 94" class="blueStroke"/>
  <path d="M255 370 L255 328" class="blueStroke"/>
  <path d="M429 170 L496 170 L496 287 L562 287" class="blueStroke"/>

