  <!-- H_v* -->
  <text x="540" y="184" class="serif label">H<tspan baseline-shift="sub" font-size="28">v</tspan><tspan baseline-shift="super" font-size="28">*</tspan></text>
  <rect x="607" y="140" width="63" height="62" class="token" fill="#f5c5a4"/>
  <rect x="750" y="140" width="63" height="62" class="token" fill="#f5c5a4"/>
