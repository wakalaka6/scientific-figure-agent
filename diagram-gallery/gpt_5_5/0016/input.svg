      <path d="M51 14c15-9 31 4 24 20 13 3 15 23 2 30 2 18-19 22-29 11V17"
            stroke="#2636a0" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M23 34c12 0 8 11 1 12M22 58c10-2 11 9 4 12" stroke="#f2a21b" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M67 34c-12 0-8 11-1 12M68 58c-10-2-11 9-4 12" stroke="#f2a21b" stroke-width="5" fill="none" stroke-linecap="round"/>
    </symbol>

    <symbol id="cube" viewBox="0 0 34 34">
      <polygon points="6,9 22,3 31,8 15,15" fill="#5f9bd3"/>
      <polygon points="6,9 15,15 15,31 6,25" fill="#2e73bb"/>
      <polygon points="15,15 31,8 31,24 15,31" fill="#155baa"/>
    </symbol>

    <symbol id="dataStack" viewBox="0 0 150 85">
