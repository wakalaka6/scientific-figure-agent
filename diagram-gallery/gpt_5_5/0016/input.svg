        <polygon points="0,20 55,0 55,65 0,85" fill="url(#greenGrid)" opacity=".5"/>
        <polygon points="25,16 80,-4 80,61 25,81" fill="url(#greenGrid)" opacity=".65"/>
        <polygon points="50,13 105,-7 105,58 50,78" fill="url(#greenGrid)" opacity=".82"/>
        <polygon points="75,10 130,-10 130,55 75,75" fill="url(#greenGrid)"/>
      </g>
    </symbol>

    <symbol id="maskedStack" viewBox="0 0 170 82">
      <polygon points="0,20 50,4 50,70 0,82" fill="url(#greenGrid)" opacity=".55"/>
      <polygon points="28,16 78,0 78,66 28,78" fill="#ef7380" opacity=".68"/>
      <polygon points="56,16 106,0 106,66 56,78" fill="url(#greenGrid)" opacity=".85"/>
      <polygon points="84,14 134,-2 134,64 84,76" fill="#ef7380" opacity=".7"/>
      <polygon points="112,12 162,-4 162,62 112,74" fill="url(#redMaskGrid)" opacity=".95"/>
    </symbol>
