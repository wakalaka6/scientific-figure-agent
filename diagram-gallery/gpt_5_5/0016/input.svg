<svg xmlns="http://www.w3.org/2000/svg" width="1810" height="890" viewBox="0 0 1810 890">
  <defs>
    <style>
      .serif{font-family:"Times New Roman", Times, serif;fill:#000}
      .panel{fill:#fff;stroke:#000;stroke-width:4}
      .box{fill:#eee;stroke:#000;stroke-width:4}
      .dash{fill:none;stroke:#000;stroke-width:3;stroke-dasharray:9 6}
      .thin{stroke:#000;stroke-width:3;fill:none}
      .thick{stroke:#000;stroke-width:4;fill:none}
      .grayArrow{fill:#e4e4e4}
      .blue{stroke:#243aa0}
      .orange{stroke:#f0a21a}
    </style>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#000"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#e4e4e4"/>
    </marker>

    <linearGradient id="udtGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c9f8de"/>
      <stop offset="0.45" stop-color="#f6f0aa"/>
      <stop offset="0.73" stop-color="#ffc482"/>
      <stop offset="1" stop-color="#f67889"/>
    </linearGradient>

    <linearGradient id="blueCube" x1="0" x2="1">
      <stop offset="0" stop-color="#6da1d7"/>
      <stop offset="1" stop-color="#1359a8"/>
    </linearGradient>

    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0.35 0.55"/>
      </feComponentTransfer>
    </filter>

    <pattern id="greenGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#0bb168"/>
      <path d="M0 0H18M0 0V18" stroke="#fff" stroke-opacity=".45" stroke-width="1"/>
      <rect x="4" y="4" width="5" height="5" fill="#f4ec49" opacity=".7"/>
      <rect x="11" y="10" width="4" height="4" fill="#006b56" opacity=".6"/>
    </pattern>

    <pattern id="redMaskGrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="#16b274"/>
      <path d="M0 0H26M0 0V26" stroke="#eee" stroke-opacity=".55"/>
      <rect x="0" y="0" width="13" height="13" fill="#f06d78" opacity=".85"/>
      <rect x="14" y="15" width="12" height="11" fill="#f06d78" opacity=".75"/>
    </pattern>

    <symbol id="brain" viewBox="0 0 90 95">
      <path d="M44 8v78" stroke="#2636a0" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M39 14c-15-9-31 4-24 20-13 3-15 23-2 30-2 18 19 22 29 11V17"
