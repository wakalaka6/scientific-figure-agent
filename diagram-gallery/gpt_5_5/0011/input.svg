<svg width="2048" height="1287" viewBox="0 0 2048 1287" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .txt{font-family: Arial, Helvetica, sans-serif; fill:#000;}
      .small{font-size:32px;}
      .med{font-size:38px;}
      .large{font-size:44px;}
      .title{font-size:42px; font-weight:700; letter-spacing:2px;}
      .italic{font-family:"Courier New", monospace; font-style:italic; fill:#777;}
      .boxstroke{stroke:#0d3342; stroke-width:4; fill:#fff;}
      .peach{fill:#f8dfd3; stroke:#0d3342; stroke-width:4;}
      .bluebox{fill:#dcedfb; stroke:#0d3342; stroke-width:4;}
      .tealLine{stroke:#176b86; stroke-width:4; fill:none;}
      .dash{stroke:#aaa; stroke-width:4; stroke-dasharray:12 8;}
      .nodeStroke{stroke:#0d3342; stroke-width:4;}
    </style>

    <marker id="arrowTeal" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L13,6.5 L0,13 z" fill="#176b86"/>
    </marker>
    <marker id="arrowBlue" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L13,6.5 L0,13 z" fill="#139bd1"/>
    </marker>
    <marker id="arrowGray" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L13,6.5 L0,13 z" fill="#cfcfcf"/>
    </marker>

    <pattern id="hatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#fbfbfb"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#d5d5d5" stroke-width="4"/>
    </pattern>

    <symbol id="robot" viewBox="0 0 90 90">
      <g fill="#fff" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <line x1="45" y1="20" x2="45" y2="7"/>
        <circle cx="45" cy="7" r="6"/>
        <rect x="18" y="22" width="54" height="48" rx="8"/>
        <rect x="6" y="36" width="12" height="22" rx="3"/>
        <rect x="72" y="36" width="12" height="22" rx="3"/>
        <circle cx="32" cy="43" r="4" fill="#000"/>
        <circle cx="58" cy="43" r="4" fill="#000"/>
        <path d="M34 56 Q45 63 56 56"/>
      </g>
    </symbol>

    <symbol id="retriever" viewBox="0 0 80 80">
      <g fill="none" stroke="#000" stroke-width="7" stroke-linecap="round">
        <circle cx="31" cy="31" r="22"/>
        <line x1="49" y1="49" x2="72" y2="72"/>
      </g>
    </symbol>

    <symbol id="answer" viewBox="0 0 80 80">
      <g>
        <path d="M40 5 C58 5 73 20 73 40 C73 50 68 60 61 66 L66 78 L52 71 C48 73 44 75 40 75 C21 75 6 59 6 40 C6 20 21 5 40 5Z"
              fill="#48e36e" stroke="#000" stroke-width="3"/>
        <text x="40" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
              font-size="54" fill="#fff" stroke="#000" stroke-width="1.5">A</text>
      </g>
    </symbol>

    <symbol id="chosen" viewBox="0 0 70 70">
      <rect x="5" y="5" width="60" height="60" rx="10" fill="#5198d8" stroke="#0d3342" stroke-width="4"/>
    </symbol>

    <symbol id="discarded" viewBox="0 0 70 70">
      <rect x="5" y="5" width="60" height="60" rx="10" fill="url(#hatch)" stroke="#0d3342" stroke-width="4"/>
    </symbol>

    <symbol id="flame" viewBox="0 0 60 60">
      <path d="M29 55 C15 53 8 43 11 31 C13 20 22 14 21 4 C31 12 34 20 33 28 C38 22 43 18 42 9 C52 20 56 30 54 39 C51 50 41 56 29 55Z" fill="#ff7a18"/>
      <path d="M31 53 C22 50 20 42 23 35 C26 29 31 26 30 19 C38 27 42 34 40 42 C39 49 35 52 31 53Z" fill="#ffd22d"/>
    </symbol>

    <symbol id="medal" viewBox="0 0 80 80">
      <path d="M22 51 L11 75 L30 67 L40 80 L48 55Z" fill="#3575c9"/>
      <path d="M53 51 L69 75 L51 67 L42 80 L35 55Z" fill="#3575c9"/>
      <path d="M40 9 L47 19 L59 17 L61 29 L72 35 L65 45 L68 57 L56 60 L50 71 L40 65 L30 71 L24 60 L12 57 L15 45 L8 35 L19 29 L21 17 L33 19Z"
            fill="#ffd23d" stroke="#f3b51e" stroke-width="3"/>
      <circle cx="40" cy="40" r="17" fill="#ffb936"/>
      <path d="M40 27 L44 36 L54 36 L46 42 L49 52 L40 46 L31 52 L34 42 L26 36 L36 36Z" fill="#ffe577"/>
    </symbol>
  </defs>

  <rect width="2048" height="1287" fill="#fff"/>

  <!-- Legend -->
  <rect x="169" y="15" width="1555" height="99" rx="16" fill="none" stroke="#df6f33" stroke-width="4"/>
  <use href="#robot" x="204" y="23" width="88" height="88"/>
  <text class="txt med" x="322" y="82">LLM</text>
  <use href="#retriever" x="439" y="38" width="62" height="62"/>
  <text class="txt med" x="519" y="82">retriever</text>
  <use href="#answer" x="684" y="34" width="65" height="65"/>
  <text class="txt med" x="775" y="82">answer</text>
  <use href="#chosen" x="956" y="30" width="72" height="72"/>
  <text class="txt med" x="1044" y="82">chosen state</text>
  <use href="#discarded" x="1306" y="33" width="70" height="70"/>
  <text class="txt med" x="1407" y="82">discarded state</text>

  <!-- Dividers and section text -->
  <line x1="930" y1="145" x2="930" y2="1267" class="dash"/>
  <line x1="930" y1="362" x2="2048" y2="362" class="dash"/>
  <text class="italic large" x="963" y="187">Training</text>
  <text class="italic large" x="963" y="1269">Inference</text>

