  <text x="1142" y="37" class="math" font-size="26">v ← g + (μ + Δ)v</text>
  <text x="1165" y="78" font-family="Arial, Helvetica, sans-serif" font-size="43" text-anchor="middle" fill="#8facdf">↕</text>
  <line x1="1125" y1="98" x2="1211" y2="98" stroke="#000" stroke-width="2.2" marker-end="url(#arrow_black)"/>

  <text x="1142" y="236" class="math" font-size="26">v ← g + (μ − Δ)v</text>
  <text x="1165" y="279" font-family="Arial, Helvetica, sans-serif" font-size="43" text-anchor="middle" fill="#f5c828">↕</text>
