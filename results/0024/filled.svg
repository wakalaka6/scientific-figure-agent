    <tspan x="643" y="158">cur = </tspan><tspan fill="#008b00" font-weight="700">sqlite3.connect</tspan><tspan>(DB).</tspan><tspan fill="#0070c0" font-weight="700">cursor</tspan><tspan>()</tspan>
    <tspan x="643" y="180" fill="#d00020" font-weight="700">min</tspan><tspan fill="#222"> = </tspan><tspan fill="#0070c0" font-weight="700">input</tspan><tspan fill="#222">('Min?'); </tspan><tspan fill="#d00020" font-weight="700">max</tspan><tspan fill="#222"> = </tspan><tspan fill="#0070c0" font-weight="700">input</tspan><tspan fill="#222">('Max?')</tspan>
    <tspan x="643" y="207">...</tspan>
    <tspan x="643" y="231" fill="#d00020" font-weight="700">Q</tspan><tspan fill="#222"> = "</tspan><tspan fill="#008b00" font-weight="700">SELECT COUNT</tspan><tspan fill="#222">(*) </tspan><tspan fill="#008b00" font-weight="700">FROM</tspan><tspan fill="#222"> items \</tspan>
    <tspan x="774" y="258" fill="#008b00" font-weight="700">WHERE</tspan><tspan fill="#222"> price &lt;= </tspan><tspan fill="#d00020" font-weight="700">{max}</tspan><tspan fill="#222"> \</tspan>
    <tspan x="774" y="285" fill="#008b00" font-weight="700">AND</tspan><tspan fill="#222"> price &gt;= </tspan><tspan fill="#d00020" font-weight="700">{min}</tspan><tspan fill="#222">"</tspan>
    <tspan x="643" y="315">cur.</tspan><tspan fill="#0070c0" font-weight="700">execute</tspan><tspan>(</tspan><tspan fill="#d00020" font-weight="700">Q</tspan><tspan>)</tspan>
  </text>

  
