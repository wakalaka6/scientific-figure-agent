  <g id="slot_question_icon" data-bbox="[9,56,67,68]" data-role="asset" data-kind="svg_icon" data-description="question mark task icon" data-canonical-asset-id="question_icon" data-duplicate-of="">
    <rect x="9" y="56" width="67" height="68" fill="#f8f8f8" stroke="#666" stroke-width="2" stroke-dasharray="6 4"/>
    <line x1="9" y1="56" x2="76" y2="124" stroke="#aaa"/>
    <line x1="76" y1="56" x2="9" y2="124" stroke="#aaa"/>
    <text x="42.5" y="90" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle">ASSET_SLOT</text>
  </g>
  <text x="82" y="118" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Task Description</text>
  <rect x="64" y="132" width="311" height="185" fill="#ffffff" stroke="#111" stroke-width="3" stroke-dasharray="5 6" filter="url(#shadow)"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="25" font-style="italic" fill="#111">
    <tspan x="80" y="180">Count the number of</tspan>
    <tspan x="80" y="217">items in DB with a price</tspan>
    <tspan x="80" y="254">within the range specified</tspan>
    <tspan x="80" y="291">by the user’s inputs.</tspan>
  </text>

  <!-- Policy model asset -->
  <g id="slot_policy_model_icon" data-bbox="[434,151,135,111]" data-role="asset" data-kind="svg_icon" data-description="policy model neural network diagram icon" data-canonical-asset-id="policy_model_icon" data-duplicate-of="">
