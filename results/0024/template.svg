<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="844" viewBox="0 0 1600 844">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
