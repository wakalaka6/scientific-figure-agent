  </text>

  <text x="850" y="591" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700" text-anchor="middle">+</text>

  <text x="82" y="717" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#222">
    Convert the program into a <tspan font-weight="700">Control Flow Graph (CFG)</tspan> and conduct
  </text>
  <text x="158" y="746" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#222">
