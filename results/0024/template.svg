    <text x="501.5" y="206.5" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" dominant-baseline="middle">ASSET_SLOT</text>
  </g>
  <text x="494" y="306" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" text-anchor="middle">Policy Model</text>

  <!-- Generated Program panel -->
  <rect x="603" y="84" width="616" height="262" rx="15" ry="15" fill="#e8e8e8" stroke="#111" stroke-width="3" filter="url(#shadow)"/>
  <g id="slot_code_icon_top" data-bbox="[596,49,54,67]" data-role="asset" data-kind="svg_icon" data-description="code file icon" data-canonical-asset-id="code_file_icon" data-duplicate-of="">
    <rect x="596" y="49" width="54" height="67" fill="#f8f8f8" stroke="#666" stroke-width="2" stroke-dasharray="6 4"/>
    <line x1="596" y1="49" x2="650" y2="116" stroke="#aaa"/>
    <line x1="650" y1="49" x2="596" y2="116" stroke="#aaa"/>
    <text x="623" y="82.5" font-family="Arial, Helvetica, sans-serif" font-size="8" text-anchor="middle" dominant-baseline="middle">ASSET_SLOT</text>
  </g>
  <text x="656" y="116" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Generated Program</text>
  <rect x="629" y="132" width="558" height="193" fill="#ffffff" stroke="#111" stroke-width="3" stroke-dasharray="5 6"/>
  <text font-family="'Courier New', monospace" font-size="22" fill="#222">
    <tspan x="643" y="158">cur = </tspan><tspan fill="#008b00" font-weight="700">sqlite3.connect</tspan><tspan>(DB).</tspan><tspan fill="#0070c0" font-weight="700">cursor</tspan><tspan>()</tspan>
    <tspan x="643" y="180" fill="#d00020" font-weight="700">min</tspan><tspan fill="#222"> = </tspan><tspan fill="#0070c0" font-weight="700">input</tspan><tspan fill="#222">('Min?'); </tspan><tspan fill="#d00020" font-weight="700">max</tspan><tspan fill="#222"> = </tspan><tspan fill="#0070c0" font-weight="700">input</tspan><tspan fill="#222">('Max?')</tspan>
    <tspan x="643" y="207">...</tspan>
    <tspan x="643" y="231" fill="#d00020" font-weight="700">Q</tspan><tspan fill="#222"> = "</tspan><tspan fill="#008b00" font-weight="700">SELECT COUNT</tspan><tspan fill="#222">(*) </tspan><tspan fill="#008b00" font-weight="700">FROM</tspan><tspan fill="#222"> items \</tspan>
    <tspan x="774" y="258" fill="#008b00" font-weight="700">WHERE</tspan><tspan fill="#222"> price &lt;= </tspan><tspan fill="#d00020" font-weight="700">{max}</tspan><tspan fill="#222"> \</tspan>
    <tspan x="774" y="285" fill="#008b00" font-weight="700">AND</tspan><tspan fill="#222"> price &gt;= </tspan><tspan fill="#d00020" font-weight="700">{min}</tspan><tspan fill="#222">"</tspan>
    <tspan x="643" y="315">cur.</tspan><tspan fill="#0070c0" font-weight="700">execute</tspan><tspan>(</tspan><tspan fill="#d00020" font-weight="700">Q</tspan><tspan>)</tspan>
  </text>

  <!-- Red downward arrows to analysis/reward panels -->
  <line x1="704" y1="331" x2="704" y2="388" stroke="#ff4040" stroke-width="11" marker-end="url(#arrowRed)"/>
  <line x1="1058" y1="331" x2="1058" y2="388" stroke="#ff4040" stroke-width="11" marker-end="url(#arrowRed)"/>

